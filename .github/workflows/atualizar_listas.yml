name: "Atualizar M3U e EPG"

on:
  schedule:
    # Roda todos os dias às 03:00 no Horário de Brasília / UTC-3 (06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite forçar a execução manual clicando no botão

jobs:
  build:
    runs-on: ubuntu-latest # <--- Corrigido aqui!

    steps:
    # 1. Baixa o código do seu repositório
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Configura o ambiente Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala as dependências (requests)
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Executa o script que gera o M3U completo
    - name: Executar Gerador M3U
      run: python gerar_m3u.py

    # 5. Executa o script que gera o EPG estruturado
    - name: Executar Gerador EPG
      run: python gerar_epg.py

    # 6. Faz o commit das atualizações e empurra de volta para o repositório
    - name: Subir arquivos atualizados para o GitHub
      run: |
        git config --local user.email "104462712+JulioCesarXY@users.noreply.github.com"
        git config --local user.name "JulioCesarXY"
        git add soul_tv_api_mestre.json soul_tv_categorizado.m3u soul_tv_guia.xml
        git commit -m "Automação: Lista M3U e EPG atualizados ✅" || echo "Nenhuma alteração detectada"
        git push
