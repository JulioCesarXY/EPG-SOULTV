name: Atualizar M3U e EPG Diariamente

on:
  schedule:
    # Roda todos os dias às 03:00 no Horário de Brasília / UTC-3 (06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite que você force a execução manual pelo botão no GitHub

jobs:
  build:
    runs-code: ubuntu-latest

    steps:
    # 1. Baixa o código do seu repositório para a máquina virtual do GitHub
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Configura o ambiente Python na máquina virtual
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala as dependências (requests)
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Executa o primeiro script para atualizar a lista mestre e gerar o M3U
    - name: Executar Gerador M3U
      run: python gerar_m3u.py

    # 5. Executa o segundo script para gerar o guia de programação XMLTV
    - name: Executar Gerador EPG
      run: python gerar_epg.py

    # 6. Salva as alterações, faz o commit e o push de volta para o seu repositório
    - name: Subir arquivos atualizados para o GitHub
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add soul_tv_api_mestre.json soul_tv_categorizado.m3u soul_tv_guia.xml
        git commit -m "Automação: Lista M3U e EPG atualizados ✅" || echo "Nenhuma alteração detectada"
        git push
